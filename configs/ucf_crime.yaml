_base_: ./base.yaml

dataset:
  name: ucf_crime
  root: /g/ucf
  split: train
  annotation_file: experiments/ucf/test_video_annotations.txt
  num_segments: 32
  image_size: 224
  class_names:
    - normal
    - Abuse
    - Arrest
    - Arson
    - Assault
    - Burglary
    - Explosion
    - Fighting
    - RoadAccidents
    - Robbery
    - Shooting
    - Shoplifting
    - Stealing
    - Vandalism

model:
  prototype:
    num_normal_prototypes: 4
    num_abnormal_prototypes: 2
    normal_class_index: 0
    multi_proto_aggregation: softmax
    multi_proto_temperature: 1.5
    use_motion_prototypes: true
    visual_alpha: 0.7
    motion_alpha: 0.3
    normal_compact_weight: 0.05
    normal_diversity_weight: 0.01
    normal_diversity_margin: 0.95

loss:
  weights:
    normal_supp: 0.002

metrics:
  primary: map
